user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Définition des serveurs en amont (Upstream)
    upstream user_service {
        server user-service:8080; # Port par défaut des microservices
    }
    upstream product_service {
        server product-service:8080;
    }
    upstream order_service {
        server order-service:8080;
    }
    upstream payment_service {
        server payment-service:8080;
    }
    upstream inventory_service {
        server inventory-service:8080;
    }
    upstream notification_service {
        server notification-service:8080;
    }
    upstream keycloak_service {
        server keycloak:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # Redirection vers Keycloak pour l'authentification
        location /auth/ {
            proxy_pass http://keycloak_service/realms/myboutique/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Routage vers les microservices
        location /users/ {
            proxy_pass http://user_service/;
        }

        location /products/ {
            proxy_pass http://product_service/;
        }

        location /orders/ {
            proxy_pass http://order_service/;
        }

        location /payments/ {
            proxy_pass http://payment_service/;
        }

        location /inventory/ {
            proxy_pass http://inventory_service/;
        }

        location /notifications/ {
            proxy_pass http://notification_service/;
        }

        # Route par défaut pour les services non encore migrés (Monolithe)
        location / {
            return 200 'Welcome to MyBoutique API Gateway. The Monolith is still here, but we are migrating!';
        }
    }
}
